services:
  repocanvas:
    image: nginx:1.27-alpine
    container_name: repocanvas
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./src:/usr/share/nginx/html/src:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-web}
      - traefik.http.routers.repocanvas.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.repocanvas.entrypoints=websecure
      - traefik.http.routers.repocanvas.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
      - traefik.http.services.repocanvas.loadbalancer.server.port=80

networks:
  web:
    name: ${TRAEFIK_NETWORK:-web}
    external: true

